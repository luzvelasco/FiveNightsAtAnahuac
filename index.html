<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Five Nights At Anahuac</title>
    <style>
        body { margin: 0; background: black; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; }
        .screen { position: absolute; width: 100vw; height: 100vh; display: none; background-size: cover; background-position: center; transition: opacity 1s ease-in-out; }
        
        #start-screen { display: block; background-image: url('img/inicio.jpeg'); }
    
        #context-screen { background-image: url('img/contexto.png'); z-index: 60; opacity: 1; }
        #night-screen { background-color: black; z-index: 50; }
        #gameover-screen { background-image: url('img/gameover.png'); }
        #win-screen { background-image: url('img/youwon.png'); }

        #hud { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 24px; z-index: 100; pointer-events: none; text-shadow: 2px 2px black; }

        #game-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); width: 100vw; height: 100vh; gap: 4px; background: #111; }
        .cam { position: relative; background-color: #050505; background-size: cover; background-position: center; border: 1px solid #333; cursor: crosshair; }
        .cam-label { position: absolute; bottom: 10px; left: 10px; font-size: 14px; background: rgba(0,0,0,0.8); padding: 2px 5px; color: #0f0; z-index: 2; }

        .danger::before { 
            content: ""; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 0, 0.3); 
            box-shadow: inset 0 0 100px rgba(255, 255, 0, 0.6); 
            pointer-events: none; 
            z-index: 1;
        }
        
        #night-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; text-align: center; background-image: url('img/night1.jpg'); background-size: contain; background-repeat: no-repeat; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body onclick="initAudio()">
    <audio id="snd-general" src="sounds/generalaudio.mp3" loop></audio>
    <audio id="snd-bg" src="sounds/BackgroundMusic.mp3" loop></audio>
    <audio id="snd-scare" src="sounds/Jumpscare Sound.mp3"></audio>
    <audio id="snd-intro"></audio>

    <div id="start-screen" class="screen"></div>
    <div id="context-screen" class="screen"></div>
    
    <div id="night-screen" class="screen"><div id="night-msg"><span style="margin-top: 100px;" id="night-num">1st Night</span></div></div>

    <div id="game-screen" class="screen">
        <div id="hud">NOCHE: <span id="n-val">1</span> | PUNTOS: <span id="pts">0</span>/10 | TIEMPO: <span id="time">1.0</span>s</div>
        <div id="game-grid">
            <div class="cam" id="cam1" onclick="catchLeonel(1)"><div class="cam-label">CAM 1: ENTRADA</div></div>
            <div class="cam" id="cam2" onclick="catchLeonel(2)"><div class="cam-label">CAM 2: CISCO</div></div>
            <div class="cam" id="cam3" onclick="catchLeonel(3)"><div class="cam-label">CAM 3: OXXO</div></div>
            <div class="cam" id="cam4" onclick="catchLeonel(4)"><div class="cam-label">CAM 4: BANDERA</div></div>
            <div class="cam" id="cam5" onclick="catchLeonel(5)"><div class="cam-label">CAM 5: PAPA</div></div>
            <div class="cam" id="cam6" onclick="catchLeonel(6)"><div class="cam-label">CAM 6: PASILLO</div></div>
        </div>
    </div>

    <div id="gameover-screen" class="screen"></div>
    <div id="win-screen" class="screen"></div>

    <script>
        const camConfig = {
            1: { normal: 'img/entrada.png', danger: 'img/entrada2.jpeg' },
            2: { normal: 'img/cisco.png', danger: 'img/cisco2.jpeg' },
            3: { normal: 'img/oxxo.png', danger: 'img/oxxo2.jpeg' },
            4: { normal: 'img/bandera.png', danger: 'img/bandera2.jpeg' },
            5: { normal: 'img/papa.png', danger: 'img/papa2.jpeg' },
            6: { normal: 'img/pasillo.png', danger: 'img/pasillo2.jpeg' }
        };

        let state = 'START';
        let night = 1;
        let points = 0;
        let timer = 0;
        let activeCams = [];
        let gameLoop;
        let audioStarted = false;
        
        const sndGeneral = document.getElementById('snd-general');
        const sndBg = document.getElementById('snd-bg');
        const sndScare = document.getElementById('snd-scare');
        const sndIntro = document.getElementById('snd-intro');

        function initAudio() { 
            if (!audioStarted && state === 'START') { 
                sndGeneral.play(); 
                audioStarted = true; 
            } 
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                if (state === 'START') {
                    showContext();
                }
                if (state === 'GAMEOVER' || state === 'WIN') location.reload();
            }
        });

        function showContext() {
            state = 'CONTEXT';
            show('context-screen');
            

            setTimeout(() => {
                document.getElementById('context-screen').style.opacity = "0";
            }, 2000);

            setTimeout(() => {
                startSequence();
            }, 3000);
        }

        function startSequence() {
            state = 'INTRO';
            sndGeneral.pause(); 
            sndGeneral.currentTime = 0; 
            
            show('night-screen');
            document.getElementById('night-num').innerText = "Night " + night;
            document.getElementById('n-val').innerText = night;
            
            let ext = ".wav"; 
            sndIntro.src = "sounds/night" + night + "audio" + ext;
            
            sndIntro.play().catch(() => {
                setTimeout(startGame, 3000);
            });
            sndIntro.onended = () => startGame();
        }

        function startGame() {
            state = 'PLAY';
            show('game-screen');
            sndBg.play(); 
            setAllCamsToNormal(); 
            resetRound();
            if (!gameLoop) runTimer();
        }

        function setAllCamsToNormal() {
            for (let id in camConfig) {
                document.getElementById('cam' + id).style.backgroundImage = `url('${camConfig[id].normal}')`;
            }
        }

        function runTimer() {
            gameLoop = setInterval(() => {
                if (state !== 'PLAY') return;
                if (activeCams.length > 0) {
                    timer -= 0.1;
                    document.getElementById('time').innerText = Math.max(0, timer).toFixed(1);
                    if (timer <= 0) gameOver();
                }
            }, 100);
        }

        function resetRound() {
            document.querySelectorAll('.cam').forEach(c => {
                c.classList.remove('danger');
            });
            setAllCamsToNormal();
            
            activeCams = [];
            let spawnDelay = Math.random() * 500 + 200;

            setTimeout(() => {
                if (state !== 'PLAY') return;
                
                let camCount = (night <= 2) ? 1 : (night <= 4) ? 2 : 3;
                let pool = [1, 2, 3, 4, 5, 6];

                for (let i = 0; i < camCount; i++) {
                    let index = Math.floor(Math.random() * pool.length);
                    let chosen = pool.splice(index, 1)[0];
                    activeCams.push(chosen);
                    
                    const camEl = document.getElementById('cam' + chosen);
                    camEl.classList.add('danger');
                    camEl.style.backgroundImage = `url('${camConfig[chosen].danger}')`;
                }

                timer = 1.0; 
                document.getElementById('time').innerText = "1.0";
            }, spawnDelay);
        }

        function catchLeonel(id) {
            if (state !== 'PLAY') return;
            if (activeCams.includes(id)) {
                activeCams = activeCams.filter(camId => camId !== id);
                const camEl = document.getElementById('cam' + id);
                camEl.classList.remove('danger');
                camEl.style.backgroundImage = `url('${camConfig[id].normal}')`;

                if (activeCams.length === 0) {
                    points++;
                    document.getElementById('pts').innerText = points;
                    if (points >= 10) {
                        if (night < 5) {
                            night++;
                            points = 0;
                            document.getElementById('pts').innerText = "0";
                            sndBg.pause();
                            startSequence();
                        } else {
                            win();
                        }
                    } else {
                        resetRound();
                    }
                }
            } else {
                gameOver();
            }
        }

        function gameOver() {
            state = 'GAMEOVER';
            sndBg.pause(); sndIntro.pause();
            sndScare.play();
            show('gameover-screen');
        }

        function win() {
            state = 'WIN';
            sndBg.pause();
            sndGeneral.play(); 
            show('win-screen');
        }

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            
            if(id === 'context-screen') document.getElementById(id).style.opacity = "1";
        }
    </script>
</body>
</html>
